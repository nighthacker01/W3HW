<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位名片 | Digital Business Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="rippleCanvas"></canvas>

    <main class="container">
        <div class="card">
            <div class="profile-wrapper">
                <img src="./img/Profile.png" alt="Profile Photo" class="profile-img">
            </div>

            <h1 class="name">林子又</h1>
            <p class="bio">
                目前就讀國立台北科技大學，互動設計系，大三生，喜歡打排球跟羽球
            </p>

            <div class="social-links">
                <a href="https://www.instagram.com/" class="btn">Instagram</a>
                <a href="https://github.com/" class="btn">GitHub</a>
                <a href="https://www.google.com" class="btn">Email</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
